<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal 7-Day Grid Task Manager</title>

    <!-- ========================================== -->
    <!-- 1. CSS STYLING ENGINE (Locked & Fixed)     -->
    <!-- ========================================== -->
    <style>
        :root {
            --bg-color: #f4f3ef;        
            --panel-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #718096;
            --border-color: #e2e8f0;
            
            /* Pastel Palette from image_ad6f27.png */
            --pastel-stuck: #F88378;   
            --pastel-ready: #FBCEB1;   
            --pastel-progress: #AFD9AE;
            --pastel-done: #43B3AE;    
            
            --purple-btn: #6c5ce7;
            --blue-category: #74b9ff;
            --gray-category: #b2bec3;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .nav-tabs {
            display: flex;
            background-color: #ffffff;
            padding: 12px 20px 0 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 5px;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: var(--purple-btn);
            border-bottom-color: var(--purple-btn);
        }

        .tab-content {
            display: none;
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        .input-panel {
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        /* Day Filtering Bar Styles */
        .filter-strip {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            align-items: center;
        }
        .filter-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-right: 8px;
        }
        .filter-bubble {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }
        .filter-bubble.active {
            background-color: var(--purple-btn);
            color: #fff;
            border-color: var(--purple-btn);
        }

        input, select {
            background-color: #ffffff;
            border: 1px solid #cbd5e0;
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus, select:focus {
            border-color: var(--purple-btn);
            outline: none;
        }

        button.primary-btn {
            background-color: var(--purple-btn);
            color: #ffffff;
            border: none;
            padding: 9px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .table-container {
            background: var(--panel-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            overflow: hidden;
        }

        .task-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        .task-table th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            padding: 12px 16px;
            border-bottom: 2px solid var(--border-color);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .task-table td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .task-table tr:hover { background-color: #f8fafc; }

        .status-select, .type-select {
            border: none;
            font-weight: 600;
            border-radius: 4px;
            padding: 6px 10px;
            cursor: pointer;
            width: 100%;
            max-width: 140px;
            text-align: center;
            text-align-last: center;
            appearance: none;
        }

        .status-ready { background-color: var(--pastel-ready) !important; color: #5f3e26 !important; }
        .status-progress { background-color: var(--pastel-progress) !important; color: #2d4a2c !important; }
        .status-waiting { background-color: var(--pastel-stuck) !important; color: #fff !important; }
        .status-done { background-color: var(--pastel-done) !important; color: #fff !important; }

        .type-productive { background-color: var(--blue-category) !important; color: white; }
        .type-nonproductive { background-color: var(--gray-category) !important; color: white; }

        .inline-input-day {
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            padding: 4px;
            font-weight: 500;
        }
        .inline-input-day:hover { border-color: #cbd5e0; background: #fff; }

        .inline-note-input {
            border: 1px solid transparent;
            background: transparent;
            width: 100%;
            padding: 6px;
            font-style: italic;
            box-sizing: border-box;
            color: var(--text-color);
        }
        .inline-note-input:hover, .inline-note-input:focus {
            border-color: #cbd5e0;
            background: #fff;
            font-style: normal;
            border-radius: 4px;
            outline: none;
        }

        .row-timer-btn {
            background-color: #edf2f7;
            border: 1px solid #cbd5e0;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            margin-right: 6px;
        }
        .row-timer-btn.running {
            background-color: var(--pastel-stuck);
            color: white;
            border-color: var(--pastel-stuck);
        }

        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--pastel-stuck);
            font-size: 14px;
        }

        .metrics-grid { display: flex; gap: 20px; margin-top: 10px; }
        .metric-card {
            background-color: var(--panel-bg);
            padding: 24px;
            border-radius: 8px;
            flex: 1;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
        }
        .metric-value { font-size: 36px; font-weight: 700; margin-top: 12px; }
    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- 2. HTML STRUCTURE CONTENT (The Wireframe)  -->
    <!-- ========================================== -->
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('grid-view')">📋 Tasks Grid</button>
        <button class="tab-btn" onclick="switchTab('dashboard-view')">📊 Dashboard & Analytics</button>
    </div>

    <div id="grid-view" class="tab-content active">
        
        <!-- Input Form Strip -->
        <div class="input-panel">
            <input type="text" id="task-title" placeholder="+ Add task title..." style="flex: 2; min-width: 200px;">
            
            <select id="task-day">
                <option value="Monday">Monday</option>
                <option value="Tuesday" selected>Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
            </select>
            
            <select id="task-type">
                <option value="productive">🚀 Productive</option>
                <option value="non-productive">☕ Non-Productive</option>
            </select>
            
            <input type="number" id="task-minutes" placeholder="Mins" step="1" style="width: 80px;">
            <input type="text" id="task-note" placeholder="Notes / Annotations..." style="flex: 1; min-width: 150px;">
            <button class="primary-btn" onclick="addTask()">Add Task</button>
        </div>

        <!-- NEW: Day Filter Selection Ribbon -->
        <div class="filter-strip">
            <span class="filter-label">Filter Day:</span>
            <button class="filter-bubble active" onclick="filterByDay('All')">All Tasks</button>
            <button class="filter-bubble" onclick="filterByDay('Monday')">Mon</button>
            <button class="filter-bubble" onclick="filterByDay('Tuesday')">Tue</button>
            <button class="filter-bubble" onclick="filterByDay('Wednesday')">Wed</button>
            <button class="filter-bubble" onclick="filterByDay('Thursday')">Thu</button>
            <button class="filter-bubble" onclick="filterByDay('Friday')">Fri</button>
            <button class="filter-bubble" onclick="filterByDay('Saturday')">Sat</button>
            <button class="filter-bubble" onclick="filterByDay('Sunday')">Sun</button>
        </div>

        <!-- Spreadsheet Layout Grid -->
        <div class="table-container">
            <table class="task-table">
                <thead>
                    <tr>
                        <th style="width: 30%;">Task</th>
                        <th style="width: 12%;">Day</th>
                        <th style="width: 12%;">Status</th>
                        <th style="width: 12%;">Category</th>
                        <th style="width: 16%;">Tracked Time</th>
                        <th style="width: 23%;">Notes / Annotations</th>
                        <th style="width: 5%; text-align: center;"></th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="dashboard-view" class="tab-content">
        <h2>Weekly Performance Analytics</h2>
        <div class="metrics-grid">
            <div class="metric-card" style="border-top: 4px solid var(--pastel-done);">
                <div style="color: var(--text-muted); font-weight: 600;">Production Focus (Done)</div>
                <div class="metric-value" id="prod-hours">0 mins</div>
            </div>
            <div class="metric-card" style="border-top: 4px solid var(--pastel-stuck);">
                <div style="color: var(--text-muted); font-weight: 600;">Non-Productive Buffer</div>
                <div class="metric-value" id="non-prod-hours">0 mins</div>
            </div>
            <div class="metric-card" style="border-top: 4px solid var(--purple-btn);">
                <div style="color: var(--text-muted); font-weight: 600;">Focus Efficiency Percentage</div>
                <div class="metric-value" id="efficiency-ratio">0%</div>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- 3. APP JAVASCRIPT LOGIC (The Brains)       -->
    <!-- ========================================== -->
    <script>
        let tasks = [];
        let activeTimerTaskId = null; 
        let globalTimerInterval = null;
        let selectedDayFilter = 'All'; // Track active filter perspective

        // --- NEW FEATURE: AUDIO NOTIFIER (POMODORO) ---
        function playPomodoroChime() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5 clean tone
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.4); // Chime lasts 0.4s
            } catch(e) { console.log("Audio contexts blocked until interaction init."); }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            if(tabId === 'dashboard-view') { calculateAnalytics(); }
        }

        // --- NEW FEATURE: DAY VIEW FILTERING ENGINE ---
        function filterByDay(dayName) {
            selectedDayFilter = dayName;
            document.querySelectorAll('.filter-bubble').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText === dayName || (dayName === 'All' && btn.innerText === 'All Tasks')) {
                    btn.classList.add('active');
                }
            });
            renderGrid();
        }

        function toggleRowTimer(id) {
            if (activeTimerTaskId !== null && activeTimerTaskId !== id) {
                stopGlobalTimerInstance();
            }
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            if (activeTimerTaskId === id) {
                stopGlobalTimerInstance();
            } else {
                activeTimerTaskId = id;
                task.status = 'progress'; 
                
                globalTimerInterval = setInterval(() => {
                    task.secondsElapsed = (task.secondsElapsed || 0) + 1;
                    task.minutes = parseFloat((task.secondsElapsed / 60).toFixed(2));
                    
                    // Trigger Pomodoro break notification alert every 25 minutes (1500 seconds)
                    if (task.secondsElapsed % 1500 === 0) {
                        playPomodoroChime();
                    }
                    saveAndSoftRefreshDisplay();
                }, 1000);
            }
            saveAndSoftRefreshDisplay();
        }

        function stopGlobalTimerInstance() {
            if (globalTimerInterval) { clearInterval(globalTimerInterval); globalTimerInterval = null; }
            activeTimerTaskId = null;
        }

        function renderGrid() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            // Apply filter layer dynamically
            const displayedTasks = tasks.filter(t => selectedDayFilter === 'All' || t.day === selectedDayFilter);

            if (displayedTasks.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--text-muted); padding: 30px;">No records assigned to ${selectedDayFilter}.</td></tr>`;
                return;
            }

            displayedTasks.forEach(task => {
                const row = document.createElement('tr');
                const isRunning = (activeTimerTaskId === task.id);
                
                let currentSecs = task.secondsElapsed || 0;
                let displayMins = Math.floor(currentSecs / 60);
                let displaySecs = currentSecs % 60;
                let timeTrackerString = `${displayMins}m ${displaySecs.toString().padStart(2, '0')}s`;

                row.innerHTML = `
                    <td style="font-weight: 600; color: #111;">${task.title}</td>
                    <td>
                        <select class="inline-input-day" onchange="updateInlineField(${task.id}, 'day', this.value)">
                            <option value="Monday" ${task.day === 'Monday'?'selected':''}>Monday</option>
                            <option value="Tuesday" ${task.day === 'Tuesday'?'selected':''}>Tuesday</option>
                            <option value="Wednesday" ${task.day === 'Wednesday'?'selected':''}>Wednesday</option>
                            <option value="Thursday" ${task.day === 'Thursday'?'selected':''}>Thursday</option>
                            <option value="Friday" ${task.day === 'Friday'?'selected':''}>Friday</option>
                            <option value="Saturday" ${task.day === 'Saturday'?'selected':''}>Saturday</option>
                            <option value="Sunday" ${task.day === 'Sunday'?'selected':''}>Sunday</option>
                        </select>
                    </td>
                    <td>
                        <select class="status-select status-${task.status}" onchange="updateInlineField(${task.id}, 'status', this.value)">
                            <option value="ready" ${task.status === 'ready'?'selected':''}>Working on it</option>
                            <option value="progress" ${task.status === 'progress'?'selected':''}>In Progress</option>
                            <option value="waiting" ${task.status === 'waiting'?'selected':''}>Stuck</option>
                            <option value="done" ${task.status === 'done'?'selected':''}>Done</option>
                        </select>
                    </td>
                    <td>
                        <select class="type-select type-${task.type.replace('-','')}" onchange="updateInlineField(${task.id}, 'type', this.value)">
                            <option value="productive" ${task.type === 'productive'?'selected':''}>🚀 Productive</option>
                            <option value="non-productive" ${task.type === 'non-productive'?'selected':''}>☕ Non-Prod</option>
                        </select>
                    </td>
                    <td>
                        <div style="display: flex; align-items: center;">
                            <button class="row-timer-btn ${isRunning ? 'running' : ''}" onclick="toggleRowTimer(${task.id})">
                                ${isRunning ? '⏸ Pause' : '▶ Play'}
                            </button>
                            <span style="font-family: monospace; font-weight: bold; min-width: 65px;">${timeTrackerString}</span>
                        </div>
                    </td>
                    <td>
                        <input type="text" class="inline-note-input" value="${task.note || ''}" placeholder="Click to edit note..." onchange="updateInlineField(${task.id}, 'note', this.value)">
                    </td>
                    <td style="text-align: center;"><button class="delete-btn" onclick="deleteTask(${task.id})">🗑️</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        function addTask() {
            const title = document.getElementById('task-title').value;
            const day = document.getElementById('task-day').value;
            const type = document.getElementById('task-type').value;
            const inputMinutes = parseFloat(document.getElementById('task-minutes').value) || 0;
            const note = document.getElementById('task-note').value;

            if (!title) return alert('Provide a task title.');

            tasks.push({ 
                id: Date.now(), title, day, type, 
                minutes: inputMinutes, 
                secondsElapsed: Math.round(inputMinutes * 60),
                note, status: 'ready' 
            });
            
            saveAndSoftRefreshDisplay();
            document.getElementById('task-title').value = '';
            document.getElementById('task-minutes').value = '';
            document.getElementById('task-note').value = '';
        }

        function updateInlineField(id, field, value) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task[field] = value;
                saveAndSoftRefreshDisplay();
            }
        }

        function deleteTask(id) {
            if (activeTimerTaskId === id) stopGlobalTimerInstance();
            tasks = tasks.filter(t => t.id !== id);
            saveAndSoftRefreshDisplay();
        }

        function calculateAnalytics() {
            let productiveDoneMinutes = 0;
            let nonProductiveMinutes = 0;

            tasks.forEach(task => {
                let currentMinutes = task.secondsElapsed ? (task.secondsElapsed / 60) : (task.minutes || 0);
                if (task.type === 'productive' && task.status === 'done') {
                    productiveDoneMinutes += currentMinutes;
                } else if (task.type === 'non-productive') {
                    nonProductiveMinutes += currentMinutes;
                }
            });

            const total = productiveDoneMinutes + nonProductiveMinutes;
            const ratio = total > 0 ? Math.round((productiveDoneMinutes / total) * 100) : 0;

            document.getElementById('prod-hours').innerText = `${productiveDoneMinutes.toFixed(1)} mins`;
            document.getElementById('non-prod-hours').innerText = `${nonProductiveMinutes.toFixed(1)} mins`;
            document.getElementById('efficiency-ratio').innerText = `${ratio}%`;
        }

        // ==========================================
        // 4. PERSISTENT CLOUD DATA ENGINE HOOK      
        // ==========================================
        function saveAndSoftRefreshDisplay() {
            // Local fallback layer handler
            localStorage.setItem('myGridTasks', JSON.stringify(tasks));
            
            /* 
               FUTURE EXPANSION FOR CLOUD HOSTING:
               fetch('https://your-database.supabase.co/rest/v1/tasks', {
                   method: 'POST',
                   headers: { 'Authorization': 'Bearer KEY', 'Content-Type': 'application/json' },
                   body: JSON.stringify(tasks)
               });
            */
            renderGrid();
        }

        function loadInitialData() {
            tasks = JSON.parse(localStorage.getItem('myGridTasks')) || [];
            renderGrid();
        }

        loadInitialData();
    </script>
</body>
</html>
